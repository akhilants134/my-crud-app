<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💪 Gym Tracker</h1>
    <p class="subtitle">Log your workouts and track your progress</p>

    <!-- Form Section -->
    <div class="form-section">
      <h2>Log a Workout</h2>
      <form id="workoutForm">
        <div class="form-group">
          <label for="exercise">Exercise Name</label>
          <input type="text" id="exercise" name="exercise" placeholder="e.g., Bench Press" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight" placeholder="e.g., 70" step="0.5" required>
          </div>
          <div class="form-group">
            <label for="reps">Reps</label>
            <input type="number" id="reps" name="reps" placeholder="e.g., 10" required>
          </div>
        </div>

        <button type="submit" id="submitBtn">Log Workout</button>
      </form>
      <div id="errorMessage" class="error-message"></div>
    </div>

    <!-- Loading State -->
    <div id="loadingSpinner" class="spinner hidden"></div>

    <!-- Workouts List Section -->
    <div class="list-section">
      <h2>Your Workouts</h2>
      <div id="workoutsList" class="workouts-list">
        <p class="empty-message">Loading your workouts...</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
